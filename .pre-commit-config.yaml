fail_fast: true
default_install_hook_types: [pre-commit, pre-push]

# Exclude third-party reference ecosystem code from all hooks
exclude: ^research/

repos:
  # =============================================================================
  # STAGE 1: Fast checks (linting, formatting, syntax)
  # =============================================================================

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^implementations/python/tests/

  # =============================================================================
  # STAGE 2: Security
  # =============================================================================

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: nox-pre-commit
        name: nox pre-commit gate
        entry: bash -c 'uv tool run --from "nox[uv]==2026.4.10" nox -f noxfile.py -s hook-pre-commit -- "$@"' --
        language: system
        pass_filenames: true
        stages: [pre-commit]
      - id: nox-pre-push
        name: nox pre-push verify
        entry: bash -c 'uv tool run --from "nox[uv]==2026.4.10" nox -f noxfile.py -s hook-pre-push'
        language: system
        pass_filenames: false
        stages: [pre-push]
